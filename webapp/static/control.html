<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#191919">
  <title>Sheltr Control</title>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <style>
    :root { --bg:#191919; --section:#282828; --fg:#f0efed; --muted:#bcbab6; --bd:#bcbab6; --s1:4px; --s2:8px; --s3:12px; --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,Monaco,Liberation Mono,monospace; }
    * { box-sizing:border-box; }
    body { margin:0; padding:var(--s3); min-height:100vh; display:flex; flex-direction:column; background:var(--bg); color:var(--fg); font:13px/1.35 var(--mono); }
    .brand { display:flex; align-items:center; gap:var(--s2); margin:0; }
    .logo { width:28px; height:28px; display:block; flex:0 0 28px; }
    .layout { display:grid; gap:var(--s2); }
    .box { background:var(--section); border:1px solid var(--bd); border-radius:6px; padding:var(--s3); }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--s2); gap:var(--s2); flex-wrap:wrap; }
    h1 { font-size:17px; margin:0; }
    h2 { font-size:14px; margin:0 0 var(--s2); color:var(--muted); }
    .small { font-size:12px; color:var(--muted); margin:0; }
    .row { display:flex; gap:var(--s2); flex-wrap:wrap; align-items:flex-end; }
    label { display:flex; flex-direction:column; gap:var(--s1); font-size:12px; color:var(--muted); min-width:200px; }
    input, button { font:12px/1.2 var(--mono); }
    input { border:1px solid var(--bd); border-radius:6px; padding:6px; background:var(--section); color:var(--fg); }
    button { border:1px solid var(--bd); background:#191919; color:#fff; border-radius:6px; padding:6px 10px; cursor:pointer; }
    button:hover { background:#111; }
    button.pri { background:#1e3a57; border-color:#1e3a57; }
    button.pri:hover { background:#274967; }
    button.lon, button.lon:hover { background:#1b6b2f; border-color:#1b6b2f; color:#fff; }
    button.loff, button.loff:hover { background:#9c252d; border-color:#9c252d; color:#fff; }
    .lights { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:var(--s2); margin-top:var(--s2); }
    .card { border:1px solid var(--bd); border-radius:6px; padding:var(--s2); background:var(--section); }
    .card h3 { margin:0; font-size:13px; }
    .state { font-size:12px; font-weight:700; margin:6px 0; }
    .state.on { color:#7cc58a; }
    .state.off { color:#ff8a80; }
    .state.unknown { color:var(--muted); }
    .meta { color:var(--muted); font-size:11px; }
    .actions { display:flex; gap:6px; flex-wrap:wrap; }
    .msg { margin-top:var(--s2); white-space:pre-wrap; font-size:12px; border:1px solid var(--bd); border-radius:6px; padding:var(--s2); min-height:24px; background:var(--section); }
    a.nav { color:var(--fg); text-decoration:none; border:1px solid var(--bd); border-radius:6px; padding:6px 10px; background:var(--section); font-size:12px; }
    a.nav:hover { background:#2b2b2b; }
    .foot { margin-top:auto; padding:var(--s3) 0 2px; text-align:center; font-style:italic; font:12px/1.3 var(--mono); color:var(--muted); }
    .foot a { color:inherit; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><img class="logo" src="/static/logo.svg" alt="Logo"><h1 id="title">Sheltr Cloud</h1></div>
    <a class="nav" id="toConfig" href="/config">Vai a Config</a>
  </div>

  <main class="layout">
    <section class="box" id="loginBox">
      <h2>Login istanza</h2>
      <div class="row">
        <label>Username<input id="loginUser" autocomplete="username"></label>
        <label>Password<input id="loginPass" type="password" autocomplete="current-password"></label>
        <button id="loginBtn" type="button">Accedi</button>
      </div>
      <p class="small">Credenziali impostate nella pagina di configurazione dell'istanza.</p>
    </section>

    <section class="box hidden" id="panel">
      <div class="row">
        <button id="refreshBtn" type="button">Aggiorna stato</button>
        <button id="allOnBtn" class="pri" type="button">Accendi tutte</button>
        <button id="allOffBtn" class="pri" type="button">Spegni tutte</button>
      </div>
      <div id="lights" class="lights"></div>
    </section>

    <pre class="msg" id="msg"></pre>
  </main>

  <footer class="foot">not all those who wander are lost ~ <a href="https://filippo.im" target="_blank" rel="noopener">filippo.im</a></footer>

  <script>
    const state = {
      instanceId: "",
      instance: null,
      lights: [],
      token: "",
      authRequired: false,
      pollTimer: null
    };

    const el = {
      title: document.getElementById("title"),
      toConfig: document.getElementById("toConfig"),
      loginBox: document.getElementById("loginBox"),
      loginUser: document.getElementById("loginUser"),
      loginPass: document.getElementById("loginPass"),
      loginBtn: document.getElementById("loginBtn"),
      panel: document.getElementById("panel"),
      refreshBtn: document.getElementById("refreshBtn"),
      allOnBtn: document.getElementById("allOnBtn"),
      allOffBtn: document.getElementById("allOffBtn"),
      lights: document.getElementById("lights"),
      msg: document.getElementById("msg")
    };

    function note(text, isError = false) {
      el.msg.textContent = text || "";
      el.msg.style.color = isError ? "#ff8a80" : "var(--fg)";
    }

    function cleanText(value, fallback = "") {
      const txt = String(value ?? "").trim();
      return txt || fallback;
    }

    function slugify(value, fallback) {
      const out = cleanText(value, fallback).toLowerCase().replace(/_/g, "-").replace(/[^a-z0-9-]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
      return out || fallback;
    }

    function forcedInstanceFromUrl() {
      const parts = location.pathname.split("/").filter(Boolean);
      if (parts[0] === "control" && parts[1]) return decodeURIComponent(parts[1]);
      if (parts[0] === "instance" && parts[1]) return decodeURIComponent(parts[1]);
      const q = new URLSearchParams(location.search).get("instance");
      return q || "";
    }

    function tokenKey(instanceId) {
      return `sheltr-token-${instanceId}`;
    }

    function setPanelVisible(visible) {
      el.panel.classList.toggle("hidden", !visible);
    }

    function setLoginVisible(visible) {
      el.loginBox.classList.toggle("hidden", !visible);
    }

    async function api(path, options = {}, useAuth = true) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (useAuth && state.token) headers["X-Instance-Token"] = state.token;
      const res = await fetch(path, { ...options, headers });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = new Error(body.error || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return body;
    }

    function renderLights() {
      el.lights.innerHTML = "";
      if (!state.lights.length) {
        const p = document.createElement("p");
        p.className = "small";
        p.textContent = "Nessuna luce configurata.";
        el.lights.appendChild(p);
        return;
      }

      for (const light of state.lights) {
        const card = document.createElement("article");
        card.className = "card";

        const h = document.createElement("h3");
        h.textContent = light.name || light.id;

        const meta = document.createElement("div");
        meta.className = "meta";
        const upd = light.stateUpdatedAt ? ` • upd ${new Date(light.stateUpdatedAt).toLocaleTimeString("it-IT")}` : "";
        meta.textContent = `${light.room || "Senza stanza"} • ${light.id} • addr ${light.address}${upd}`;

        const st = document.createElement("div");
        const on = typeof light.isOn === "boolean" ? light.isOn : null;
        st.className = `state ${on === null ? "unknown" : (on ? "on" : "off")}`;
        st.textContent = on === null ? "Stato: sconosciuto" : `Stato: ${on ? "ON" : "OFF"}`;

        const actions = document.createElement("div");
        actions.className = "actions";
        ["on", "off"].forEach((action) => {
          const b = document.createElement("button");
          b.type = "button";
          b.textContent = action.toUpperCase();
          if (action === "on" && on === true) b.className = "pri lon";
          if (action === "off" && on === false) b.className = "pri loff";
          b.onclick = () => sendLightCommand(light, action);
          actions.appendChild(b);
        });

        card.appendChild(h);
        card.appendChild(meta);
        card.appendChild(st);
        card.appendChild(actions);
        el.lights.appendChild(card);
      }
    }

    function handleAuthError(err) {
      if (err && err.status === 401) {
        state.token = "";
        localStorage.removeItem(tokenKey(state.instanceId));
        setPanelVisible(false);
        setLoginVisible(true);
        note("Sessione scaduta o non valida. Effettua di nuovo il login.", true);
        return true;
      }
      return false;
    }

    async function loadLights(silent = false) {
      if (!state.instanceId) return;
      try {
        const res = await api(`/api/instances/${encodeURIComponent(state.instanceId)}/lights`);
        state.lights = Array.isArray(res.lights) ? res.lights : [];
        renderLights();
        if (!silent) note(`Stato aggiornato (${state.lights.length} luci).`);
      } catch (err) {
        if (!handleAuthError(err) && !silent) note(err.message, true);
      }
    }

    async function sendLightCommand(light, action) {
      if (!state.instanceId) return;
      try {
        const res = await api(`/api/instances/${encodeURIComponent(state.instanceId)}/lights/command`, {
          method: "POST",
          body: JSON.stringify({
            action,
            lightId: light.id,
            target: {
              boardId: light.boardId,
              boardName: light.boardName,
              address: light.address,
              channel: light.channel,
              name: light.name,
              room: light.room
            }
          })
        });

        const sent = Array.isArray(res.sent) ? res.sent : [];
        if (sent[0] && typeof sent[0].isOn === "boolean") {
          const idx = state.lights.findIndex((x) => x.id === light.id);
          if (idx >= 0) state.lights[idx].isOn = sent[0].isOn;
          renderLights();
        }

        const sendCount = sent[0] && Number.isFinite(Number(sent[0].sendCount)) ? Number(sent[0].sendCount) : 1;
        const verified = !!(sent[0] && sent[0].verified);
        const reason = sent[0] && sent[0].verifyReason ? ` (${sent[0].verifyReason})` : "";
        note(`Comando '${action}' inviato x${sendCount}${verified ? " confermato dal dispositivo" : ` in attesa conferma${reason}`}.`);
      } catch (err) {
        if (!handleAuthError(err)) note(err.message, true);
      }
    }

    async function sendAll(action) {
      if (!state.instanceId) return;
      try {
        const res = await api(`/api/instances/${encodeURIComponent(state.instanceId)}/lights/command`, {
          method: "POST",
          body: JSON.stringify({ action, all: true })
        });

        const sent = Array.isArray(res.sent) ? res.sent : [];
        const byId = new Map(sent.map((x) => [x.id, x]));
        state.lights = state.lights.map((x) => {
          const m = byId.get(x.id);
          return m && typeof m.isOn === "boolean" ? { ...x, isOn: m.isOn } : x;
        });
        renderLights();

        const sendCount = sent[0] && Number.isFinite(Number(sent[0].sendCount)) ? Number(sent[0].sendCount) : 1;
        const verifiedCount = sent.filter((x) => x && x.verified).length;
        note(`Comando '${action}' inviato a ${sent.length} luci (x${sendCount} per luce, confermate ${verifiedCount}/${sent.length}).`);
      } catch (err) {
        if (!handleAuthError(err)) note(err.message, true);
      }
    }

    function setupPolling() {
      if (state.pollTimer) window.clearInterval(state.pollTimer);
      state.pollTimer = window.setInterval(() => {
        if (!el.panel.classList.contains("hidden")) loadLights(true);
      }, 7000);
    }

    async function login() {
      if (!state.instanceId) return;
      try {
        const res = await api(`/api/instances/${encodeURIComponent(state.instanceId)}/auth/login`, {
          method: "POST",
          body: JSON.stringify({
            username: cleanText(el.loginUser.value, ""),
            password: cleanText(el.loginPass.value, "")
          })
        }, false);
        state.token = cleanText(res.token, "");
        if (!state.token) throw new Error("Token non valido");
        localStorage.setItem(tokenKey(state.instanceId), state.token);
        el.loginPass.value = "";
        setLoginVisible(false);
        setPanelVisible(true);
        await loadLights(false);
        note("Login eseguito.");
      } catch (err) {
        note(err.message, true);
      }
    }

    async function bootstrap() {
      const forcedId = slugify(forcedInstanceFromUrl(), "");
      if (!forcedId) {
        note("Istanza non specificata. Apri un URL tipo /control/casa-demo", true);
        setLoginVisible(false);
        setPanelVisible(false);
        return;
      }

      state.instanceId = forcedId;
      try {
        const res = await api(`/api/instances/${encodeURIComponent(state.instanceId)}`, {}, false);
        state.instance = res.instance;
        state.instanceId = state.instance.id;
        state.authRequired = !!(state.instance?.auth?.passwordConfigured);

        const title = `${state.instance.name} / Sheltr Cloud`;
        el.title.textContent = title;
        document.title = title;
        el.toConfig.href = `/config?instance=${encodeURIComponent(state.instance.id)}`;

        if (state.authRequired) {
          el.loginUser.value = cleanText(state.instance?.auth?.username, "");
          state.token = cleanText(localStorage.getItem(tokenKey(state.instance.id)), "");
          if (!state.token) {
            setLoginVisible(true);
            setPanelVisible(false);
            note("Login richiesto per questa istanza.");
          } else {
            setLoginVisible(false);
            setPanelVisible(true);
            await loadLights(false);
          }
        } else {
          setLoginVisible(false);
          setPanelVisible(true);
          await loadLights(false);
        }

        setupPolling();
      } catch (err) {
        note(err.message, true);
        setLoginVisible(false);
        setPanelVisible(false);
      }
    }

    el.loginBtn.addEventListener("click", login);
    el.loginPass.addEventListener("keydown", (ev) => { if (ev.key === "Enter") login(); });
    el.refreshBtn.addEventListener("click", () => loadLights(false));
    el.allOnBtn.addEventListener("click", () => sendAll("on"));
    el.allOffBtn.addEventListener("click", () => sendAll("off"));

    bootstrap();
  </script>
</body>
</html>
