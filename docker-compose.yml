services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sheltr}
      POSTGRES_USER: ${POSTGRES_USER:-sheltr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sheltr}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sheltr} -d ${POSTGRES_DB:-sheltr}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - default
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-filippo}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-filippo1994}
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    command: ["/bin/sh", "/mosquitto/config/init-mosquitto.sh"]
    networks:
      - default
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt/init-mosquitto.sh:/mosquitto/config/init-mosquitto.sh:ro
      - ./mqtt_data:/mosquitto/data
      - ./mqtt_log:/mosquitto/log

  web:
    build:
      context: ./webapp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
    networks:
      - pangolin
      - default
    environment:
      APP_PORT: "8080"
      CONFIG_FILE: /data/config.json
      DATABASE_URL: ${DATABASE_URL:-postgresql://sheltr:sheltr@postgres:5432/sheltr}
      DB_CONNECT_TIMEOUT_SEC: "${DB_CONNECT_TIMEOUT_SEC:-8}"
      DB_BOOTSTRAP_RETRIES: "${DB_BOOTSTRAP_RETRIES:-20}"
      DB_BOOTSTRAP_DELAY_SEC: "${DB_BOOTSTRAP_DELAY_SEC:-2}"
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      MQTT_USERNAME: ${MQTT_USERNAME:-filippo}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-filippo1994}
      MQTT_BASE_TOPIC: ${MQTT_BASE_TOPIC:-dr154}
      MQTT_CONFIG_QOS: "${MQTT_CONFIG_QOS:-1}"
      MQTT_COMMAND_QOS: "${MQTT_COMMAND_QOS:-1}"
      MQTT_PUBLISH_TIMEOUT_SEC: "${MQTT_PUBLISH_TIMEOUT_SEC:-6}"
      MQTT_COMMAND_RETRIES: "${MQTT_COMMAND_RETRIES:-2}"
      MQTT_COMMAND_RETRY_DELAY_MS: "${MQTT_COMMAND_RETRY_DELAY_MS:-180}"
      MQTT_COMMAND_REPEAT_ONOFF: "${MQTT_COMMAND_REPEAT_ONOFF:-2}"
      MQTT_COMMAND_REPEAT_GAP_MS: "${MQTT_COMMAND_REPEAT_GAP_MS:-120}"
      MQTT_RESPONSE_TIMEOUT_MS: "${MQTT_RESPONSE_TIMEOUT_MS:-1600}"
      MQTT_RESPONSE_RETRIES: "${MQTT_RESPONSE_RETRIES:-1}"
      MQTT_RESPONSE_RETRY_DELAY_MS: "${MQTT_RESPONSE_RETRY_DELAY_MS:-140}"
      MQTT_REQUIRE_RESPONSE: "${MQTT_REQUIRE_RESPONSE:-false}"
      MQTT_STRICT_RESPONSE: "${MQTT_STRICT_RESPONSE:-false}"
      INSTANCE_AUTH_TTL_SEC: "${INSTANCE_AUTH_TTL_SEC:-43200}"
      INSTANCE_AUTH_SECRET: "${INSTANCE_AUTH_SECRET:-}"
      CONFIG_AUTH_USERNAME: "${CONFIG_AUTH_USERNAME:-}"
      CONFIG_AUTH_PASSWORD: "${CONFIG_AUTH_PASSWORD:-}"
      CONFIG_AUTH_EMAIL: "${CONFIG_AUTH_EMAIL:-admin@sheltr.local}"
      CONFIG_AUTH_TTL_SEC: "${CONFIG_AUTH_TTL_SEC:-43200}"
      LIGHT_PROFILE_LOOP_INTERVAL_SEC: "${LIGHT_PROFILE_LOOP_INTERVAL_SEC:-20}"
    volumes:
      - ./web:/data

networks:
  pangolin:
    external: true
